services:
  redis:
    image: "redis:6.2.3-alpine"
    ports:
      - "6379:6379"
    networks:
      - hmpps

  delius:
    image: wiremock/wiremock
    networks:
      - hmpps
    volumes:
      - ./wiremock-delius:/home/wiremock
    command:
      - -verbose
      - -global-response-templating

  hmpps-auth:
    image: ghcr.io/ministryofjustice/hmpps-auth:2026-03-31.578.696b0a0
    networks:
      - hmpps
    container_name: hmpps-auth
    depends_on:
      - delius
    ports:
      - "9090:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/auth/health"]
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev,delius
      - APPLICATION_AUTHENTICATION_UI_ALLOWLIST=0.0.0.0/0
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=DEBUG
      - DELIUS_ENDPOINT_URL=http://delius:8080
      # - LOGGING_LEVEL_ROOT=INFO
      # - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB=DEBUG
      # - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK=DEBUG

  hmpps-auth-proxy:
    image: nginx:latest
    depends_on:
      - hmpps-auth
    networks:
      - hmpps
    ports:
      - "9091:9091"
    volumes:
      - ./hmpps-auth-proxy/nginx.conf:/etc/nginx/nginx.conf

  editor:
    # image: dockerbobw/flatnotes-enhanced:latest
    # container_name: editor
    # restart: unless-stopped
    # # Forces Docker to run the container using your host account permissions
    # user: "502:20"
    # environment:
    #   - FLATNOTES_AUTH_TYPE=none 
    #   - REPOPATH="/repo"  # Sets internal execution user
    #   - PUID=502
    #   - PGID=20
    # ports:
    #   - "9080:8854"
    # volumes:
    #   - ./content:/repo
    #   - ./editor:/data/DiaryMD

    # image: zefhemel/silverbullet:latest
    # container_name: silverbullet
    # volumes:
    #   - ./content:/space
    # ports:
    #   - "9080:3000"
    # user: "502:20" # Explicitly sets your PUID/PGID permissions
    # restart: unless-stopped

    image: dockerbobw/flatnotes-enhanced:latest
    container_name: flatnotes
    ports:
      - "9080:8080"
    volumes:
      - ./content:/data
      - ./editorDb:/data/.flatnotes
    environment:
      - FLATNOTES_AUTH_TYPE=none # Change to "password" if you want to secure it
      - FLATNOTES_USERNAME=dummy_user
      - FLATNOTES_PASSWORD=dummy_password
      - FLATNOTES_SECRET_KEY=dummy_secret_key_12345
      - FLATNOTES_SEARCH_SUBFOLDERS=true
      - PUID=502
      - PGID=20
      - FLATNOTES_LOG_LEVEL=DEBUG
    restart: unless-stopped

networks:
  hmpps:

volumes:
  node_module:
